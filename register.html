<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #000000, #0f2027, #203a43, #2c5364);
    background-size:400% 400%;
    animation: gradientMove 10s ease infinite;
    overflow:hidden;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.register-container{
    width:360px;
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    text-align:center;
    color:white;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:20px;
    border:3px solid #00f7ff;
    box-shadow:0 0 20px #00f7ff;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}

input:focus{
    background:rgba(0,255,255,0.2);
    box-shadow:0 0 10px #00f7ff;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00c3ff;
    transform:scale(1.05);
}

.footer{
    margin-top:15px;
    font-size:14px;
    color:#ccc;
}

.footer a{
    color:#00f7ff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="register-container">

    <!-- Male Avatar -->
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" class="avatar">

    <h2>Create Account</h2>

    <form action="/register" method="POST">
    
    <input type="text" name="fullname" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Enter Email" required>

    <input type="password" name="password" placeholder="Create Password" required>

    <input type="password" name="confirmPassword" placeholder="Confirm Password" required>

    <label>Register as</label>
    <select name="role" id="roleSelect">
    <option value="user" selected>Member</option>
    <option value="admin">Administrator</option>
    </select>

    <div id="adminKeyContainer" style="display:none;">
    <label>Admin key</label>
    <input type="password" name="adminKey" placeholder="Secret code">
    </div>

    <button type="submit">Register</button>

</form>

    <div class="footer">
        Already have an account? <a href="/login.html">Login</a>
    </div>

</div>

<script>
    // show/hide admin key input when role is changed
    (function(){
        const roleSelect = document.getElementById('roleSelect');
        const adminContainer = document.getElementById('adminKeyContainer');
        if(!roleSelect || !adminContainer) return;
        function update() {
            adminContainer.style.display = roleSelect.value === 'admin' ? 'block' : 'none';
        }
        roleSelect.addEventListener('change', update);
        // initialize on load
        update();
    })();
</script>

</body>
</html>
